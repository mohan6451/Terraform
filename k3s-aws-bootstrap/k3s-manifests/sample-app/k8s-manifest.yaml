---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-dashboard
  namespace: default
  labels:
    app: portfolio-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-dashboard
  template:
    metadata:
      labels:
        app: portfolio-dashboard
    spec:
      containers:
        - name: dashboard
          image: nginx:alpine  # replace with your Docker Hub username
          ports:
            - containerPort: 80
          env:
            - name: APP_ENV
              value: "dev"
            - name: AWS_REGION
              value: "ap-south-1"
            - name: K8S_VERSION
              value: "K3s v1.28"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName         # injects actual node name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace    # injects actual namespace
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # livenessProbe:
          #   httpGet:
          #     path: /      #/health
          #     port: 80
          #   initialDelaySeconds: 20
          #   periodSeconds: 30
          # readinessProbe:
          #   httpGet:
          #     path: /       #/health
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-dashboard-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: portfolio-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30090
